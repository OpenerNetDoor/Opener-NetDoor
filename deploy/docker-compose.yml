services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - backend

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - backend

  nats:
    image: nats:2.10-alpine
    restart: unless-stopped
    command: ["-js"]
    networks:
      - backend

  migrate:
    image: postgres:16-alpine
    restart: "no"
    env_file:
      - ./.env
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["/bin/sh", "/scripts/run-migrations.sh"]
    volumes:
      - ../ops/migrations:/migrations:ro
      - ./scripts/run-migrations.sh:/scripts/run-migrations.sh:ro
    networks:
      - backend

  core-platform:
    build:
      context: ../services/core-platform
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      HTTP_ADDR: ":8081"
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      REDIS_ADDR: redis:6379
      NATS_URL: nats://nats:4222
      NODE_SIGNING_SECRET: ${NODE_SIGNING_SECRET}
      NODE_CONTRACT_VERSION: ${NODE_CONTRACT_VERSION}
      NODE_PKI_MODE: ${NODE_PKI_MODE}
      NODE_CA_MODE: ${NODE_CA_MODE}
      NODE_CA_ACTIVE_ISSUER_ID: ${NODE_CA_ACTIVE_ISSUER_ID}
      NODE_CA_PREVIOUS_ISSUER_IDS: ${NODE_CA_PREVIOUS_ISSUER_IDS}
      NODE_CA_CERT_PATH: ${NODE_CA_CERT_PATH}
      NODE_CA_KEY_PATH: ${NODE_CA_KEY_PATH}
      NODE_CERT_RENEW_BEFORE: ${NODE_CERT_RENEW_BEFORE}
      NODE_CERT_DEFAULT_TTL: ${NODE_CERT_DEFAULT_TTL}
      NODE_CERT_MAX_TTL: ${NODE_CERT_MAX_TTL}
      NODE_LEGACY_HMAC_FALLBACK: ${NODE_LEGACY_HMAC_FALLBACK}
      RUNTIME_ENABLED: ${RUNTIME_ENABLED}
      RUNTIME_PUBLIC_HOST: ${RUNTIME_PUBLIC_HOST}
      RUNTIME_VLESS_PORT: ${RUNTIME_VLESS_PORT}
      RUNTIME_REALITY_PRIVATE_KEY: ${RUNTIME_REALITY_PRIVATE_KEY}
      RUNTIME_REALITY_PUBLIC_KEY: ${RUNTIME_REALITY_PUBLIC_KEY}
      RUNTIME_REALITY_SHORT_ID: ${RUNTIME_REALITY_SHORT_ID}
      RUNTIME_REALITY_SERVER_NAME: ${RUNTIME_REALITY_SERVER_NAME}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      nats:
        condition: service_started
    networks:
      - backend

  api-gateway:
    build:
      context: ../apps/api-gateway
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      HTTP_ADDR: ":8080"
      CORE_PLATFORM_BASE_URL: http://core-platform:8081
      JWT_ISSUER: ${JWT_ISSUER}
      JWT_AUDIENCE: ${JWT_AUDIENCE}
      JWT_SECRET: ${JWT_SECRET}
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME}
      SESSION_TTL: ${SESSION_TTL}
      SESSION_SECRET: ${SESSION_SECRET}
      SESSION_SECURE: ${SESSION_SECURE}
      ADMIN_ACCESS_SECRET: ${ADMIN_ACCESS_SECRET}
      OWNER_SCOPE_ID: ${OWNER_SCOPE_ID}
      OWNER_SUBJECT: ${OWNER_SUBJECT}
    depends_on:
      core-platform:
        condition: service_started
    networks:
      - backend

  admin-web:
    build:
      context: ..
      dockerfile: apps/admin-web/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${PUBLIC_BASE_URL}
        NEXT_PUBLIC_DEFAULT_SCOPE_ID: ${OWNER_SCOPE_ID}
        NEXT_PUBLIC_SINGLE_OWNER_MODE: "true"
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE_URL: ${PUBLIC_BASE_URL}
      NEXT_PUBLIC_DEFAULT_SCOPE_ID: ${OWNER_SCOPE_ID}
      NEXT_PUBLIC_SINGLE_OWNER_MODE: "true"
    depends_on:
      api-gateway:
        condition: service_started
    networks:
      - backend

  xray:
    image: ${XRAY_IMAGE}
    restart: unless-stopped
    command: ["run", "-c", "/etc/xray/config.json"]
    volumes:
      - ./state/xray/config.json:/etc/xray/config.json:ro
    ports:
      - "${RUNTIME_VLESS_PORT:-8443}:${RUNTIME_VLESS_PORT:-8443}"
    depends_on:
      core-platform:
        condition: service_started
    networks:
      - backend

  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    depends_on:
      api-gateway:
        condition: service_started
      admin-web:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - backend
      - public

volumes:
  postgres_data:
  caddy_data:
  caddy_config:

networks:
  public:
  backend:
    internal: true


