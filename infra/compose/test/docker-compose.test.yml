services:
  postgres-test:
    image: postgres:16-alpine
    restart: unless-stopped
    profiles: ["stage2-test"]
    environment:
      POSTGRES_DB: openernetdoor_test
      POSTGRES_USER: openernetdoor
      POSTGRES_PASSWORD: openernetdoor
    ports:
      - "${TEST_POSTGRES_PORT:-35432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openernetdoor -d openernetdoor_test"]
      interval: 5s
      timeout: 3s
      retries: 20
    tmpfs:
      - /var/lib/postgresql/data
