openapi: 3.1.0
info:
  title: Opener NetDoor Public and Admin API
  version: 1.11.0
servers:
  - url: https://api.example.com
paths:
  /v1/health:
    get:
      summary: Health check
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
  /v1/ready:
    get:
      summary: Readiness check
      responses:
        '200':
          description: Ready
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ready
  /v1/auth/session:
    get:
      summary: Resolve current admin cookie session
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Session state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminSessionInfo'
  /v1/auth/logout:
    post:
      summary: Invalidate admin session cookie
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Logout result
          content:
            application/json:
              schema:
                type: object
                required: [logged_out]
                properties:
                  logged_out:
                    type: boolean
  /v1/admin/tenants:
    get:
      summary: List tenants
      security:
        - bearerAuth: [admin:read]
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
        - $ref: '#/components/parameters/Status'
      responses:
        '200':
          description: Tenant list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantListResponse'
    post:
      summary: Create tenant
      security:
        - bearerAuth: [admin:write]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTenantRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tenant'
  /v1/admin/users:
    get:
      summary: List users in tenant
      security:
        - bearerAuth: [admin:read]
      parameters:
        - in: query
          name: tenant_id
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
        - $ref: '#/components/parameters/Status'
      responses:
        '200':
          description: User list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserListResponse'
    post:
      summary: Create user
      security:
        - bearerAuth: [admin:write]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
    delete:
      summary: Delete user
      security:
        - bearerAuth: [admin:write]
      parameters:
        - in: query
          name: id
          required: true
          schema:
            type: string
            format: uuid
        - in: query
          name: tenant_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                required: [deleted, id, tenant_id]
                properties:
                  deleted:
                    type: boolean
                  id:
                    type: string
                    format: uuid
                  tenant_id:
                    type: string
                    format: uuid
  /v1/admin/users/block:
    post:
      summary: Block user
      security:
        - bearerAuth: [admin:write]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserLifecycleRequest'
      responses:
        '200':
          description: User updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
  /v1/admin/users/unblock:
    post:
      summary: Unblock user
      security:
        - bearerAuth: [admin:write]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserLifecycleRequest'
      responses:
        '200':
          description: User updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
  /v1/admin/access-keys:
    get:
      summary: List access keys
      security:
        - bearerAuth: [admin:read]
      parameters:
        - in: query
          name: tenant_id
          schema:
            type: string
            format: uuid
        - in: query
          name: user_id
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
        - $ref: '#/components/parameters/Status'
      responses:
        '200':
          description: Access key list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessKeyListResponse'
    post:
      summary: Create access key
      security:
        - bearerAuth: [admin:write]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAccessKeyRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessKey'
    delete:
      summary: Revoke access key
      security:
        - bearerAuth: [admin:write]
      parameters:
        - in: query
          name: id
          required: true
          schema:
            type: string
            format: uuid
        - in: query
          name: tenant_id
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Revoked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessKey'
  /v1/admin/policies/tenants:
    get:
      summary: List tenant policies or get one by tenant_id
      security:
        - bearerAuth: [admin:read]
      parameters:
        - in: query
          name: tenant_id
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: Tenant policy list or single item
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/TenantPolicyListResponse'
                  - $ref: '#/components/schemas/TenantPolicy'
    put:
      summary: Create or update tenant policy
      security:
        - bearerAuth: [admin:write]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetTenantPolicyRequest'
      responses:
        '200':
          description: Upserted tenant policy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantPolicy'
  /v1/admin/policies/users:
    get:
      summary: List user policy overrides or get one by tenant_id+user_id
      security:
        - bearerAuth: [admin:read]
      parameters:
        - in: query
          name: tenant_id
          required: true
          schema:
            type: string
            format: uuid
        - in: query
          name: user_id
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: User policy list or single item
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/UserPolicyOverrideListResponse'
                  - $ref: '#/components/schemas/UserPolicyOverride'
    put:
      summary: Create or update user policy override
      security:
        - bearerAuth: [admin:write]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetUserPolicyOverrideRequest'
      responses:
        '200':
          description: Upserted user policy override
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPolicyOverride'
  /v1/admin/policies/effective:
    get:
      summary: Get effective policy for tenant/user
      security:
        - bearerAuth: [admin:read]
      parameters:
        - in: query
          name: tenant_id
          required: true
          schema:
            type: string
            format: uuid
        - in: query
          name: user_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Effective policy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EffectivePolicy'
  /v1/admin/devices/register:
    post:
      summary: Register or refresh a device with policy enforcement
      security:
        - bearerAuth: [admin:write]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterDeviceRequest'
      responses:
        '201':
          description: Device registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Device'
  /v1/admin/nodes:
    get:
      summary: List nodes by tenant
      security:
        - bearerAuth: [admin:read]
      parameters:
        - in: query
          name: tenant_id
          required: true
          schema:
            type: string
            format: uuid
        - in: query
          name: status
          schema:
            type: string
            enum: [pending, active, stale, offline, revoked]
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: Node list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NodeListResponse'
    post:
      summary: Create owner-managed node
      security:
        - bearerAuth: [admin:write]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateNodeRequest'
      responses:
        '201':
          description: Node created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Node'
  /v1/admin/nodes/detail:
    get:
      summary: Get node details by tenant and id
      security:
        - bearerAuth: [admin:read]
      parameters:
        - in: query
          name: tenant_id
          required: true
          schema:
            type: string
            format: uuid
        - in: query
          name: node_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Node details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Node'
  /v1/admin/nodes/revoke:
    post:
      summary: Revoke node by tenant and node id
      security:
        - bearerAuth: [admin:write]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NodeLifecycleRequest'
      responses:
        '200':
          description: Node revoked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Node'
  /v1/admin/nodes/reactivate:
    post:
      summary: Reactivate revoked node into pending state
      security:
        - bearerAuth: [admin:write]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NodeLifecycleRequest'
      responses:
        '200':
          description: Node reactivated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Node'
  /v1/admin/nodes/runtime/config:
    get:
      summary: Generate deterministic Xray runtime config for node
      security:
        - bearerAuth: [admin:read]
      parameters:
        - in: query
          name: tenant_id
          required: true
          schema:
            type: string
            format: uuid
        - in: query
          name: node_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Runtime config revision
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuntimeConfigResponse'
  /v1/admin/nodes/runtime/apply:
    post:
      summary: Mark latest generated runtime config as applied
      security:
        - bearerAuth: [admin:write]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RuntimeApplyRequest'
      responses:
        '200':
          description: Runtime config applied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuntimeConfigResponse'
  /v1/admin/nodes/register:
    post:
      summary: Register node with signed identity
      security:
        - bearerAuth: [admin:write]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterNodeRequest'
      responses:
        '201':
          description: Node registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NodeRegistrationResult'
  /v1/admin/nodes/heartbeat:
    post:
      summary: Node heartbeat with signature verification
      security:
        - bearerAuth: [admin:write]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NodeHeartbeatRequest'
      responses:
        '200':
          description: Heartbeat accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Node'
  /v1/admin/nodes/provisioning:
    get:
      summary: Resolve provisioning contract for node
      security:
        - bearerAuth: [admin:read]
      parameters:
        - in: query
          name: tenant_id
          required: true
          schema:
            type: string
            format: uuid
        - in: query
          name: node_id
          schema:
            type: string
            format: uuid
        - in: query
          name: node_key_id
          schema:
            type: string
      responses:
        '200':
          description: Provisioning contract
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NodeProvisioningContract'
  /v1/admin/ops/snapshot:
    get:
      summary: Get operations snapshot for tenant
      security:
        - bearerAuth: [admin:read]
      parameters:
        - in: query
          name: tenant_id
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Operations snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpsSnapshot'
  /v1/admin/ops/analytics:
    get:
      summary: Get operations analytics aggregates for tenant
      security:
        - bearerAuth: [admin:read]
      parameters:
        - in: query
          name: tenant_id
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Operations analytics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpsAnalytics'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    Limit:
      in: query
      name: limit
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    Offset:
      in: query
      name: offset
      schema:
        type: integer
        minimum: 0
        default: 0
    Status:
      in: query
      name: status
      schema:
        type: string
  schemas:
    Tenant:
      type: object
      required: [id, name, status, created_at]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        status:
          type: string
          enum: [active, suspended]
        created_at:
          type: string
          format: date-time
    TenantListResponse:
      type: object
      required: [items, limit, offset]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Tenant'
        limit:
          type: integer
        offset:
          type: integer
    CreateTenantRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
    User:
      type: object
      required: [id, tenant_id, status, created_at]
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        status:
          type: string
          enum: [active, blocked]
        note:
          type: string
        created_at:
          type: string
          format: date-time
    UserListResponse:
      type: object
      required: [items, limit, offset]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/User'
        limit:
          type: integer
        offset:
          type: integer
    CreateUserRequest:
      type: object
      required: [tenant_id, email]
      properties:
        tenant_id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        note:
          type: string
          maxLength: 500
    UserLifecycleRequest:
      type: object
      required: [tenant_id, user_id]
      properties:
        tenant_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
    AccessKey:
      type: object
      required: [id, tenant_id, user_id, key_type, secret_ref, status, created_at]
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        key_type:
          type: string
          enum: [vless, vmess, trojan, shadowsocks, wireguard, hysteria2, tuic, socks5, http]
        secret_ref:
          type: string
        status:
          type: string
          enum: [active, revoked]
        expires_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
    AccessKeyListResponse:
      type: object
      required: [items, limit, offset]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/AccessKey'
        limit:
          type: integer
        offset:
          type: integer
    CreateAccessKeyRequest:
      type: object
      required: [tenant_id, user_id, key_type]
      properties:
        tenant_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        key_type:
          type: string
        secret_ref:
          type: string
        expires_at:
          type: string
          format: date-time
          nullable: true
    TenantPolicy:
      type: object
      required: [tenant_id, updated_at]
      properties:
        tenant_id:
          type: string
          format: uuid
        traffic_quota_bytes:
          type: integer
          format: int64
          nullable: true
        device_limit:
          type: integer
          nullable: true
        default_key_ttl_seconds:
          type: integer
          nullable: true
        updated_by:
          type: string
        updated_at:
          type: string
          format: date-time
    SetTenantPolicyRequest:
      type: object
      required: [tenant_id]
      properties:
        tenant_id:
          type: string
          format: uuid
        traffic_quota_bytes:
          type: integer
          format: int64
          nullable: true
          minimum: 0
        device_limit:
          type: integer
          nullable: true
          minimum: 1
        default_key_ttl_seconds:
          type: integer
          nullable: true
          minimum: 1
    TenantPolicyListResponse:
      type: object
      required: [items, limit, offset]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/TenantPolicy'
        limit:
          type: integer
        offset:
          type: integer
    UserPolicyOverride:
      type: object
      required: [tenant_id, user_id, updated_at]
      properties:
        tenant_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        traffic_quota_bytes:
          type: integer
          format: int64
          nullable: true
        device_limit:
          type: integer
          nullable: true
        key_ttl_seconds:
          type: integer
          nullable: true
        updated_by:
          type: string
        updated_at:
          type: string
          format: date-time
    SetUserPolicyOverrideRequest:
      type: object
      required: [tenant_id, user_id]
      properties:
        tenant_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        traffic_quota_bytes:
          type: integer
          format: int64
          nullable: true
          minimum: 0
        device_limit:
          type: integer
          nullable: true
          minimum: 1
        key_ttl_seconds:
          type: integer
          nullable: true
          minimum: 1
    UserPolicyOverrideListResponse:
      type: object
      required: [items, limit, offset]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/UserPolicyOverride'
        limit:
          type: integer
        offset:
          type: integer
    EffectivePolicy:
      type: object
      required: [tenant_id, user_id, usage_bytes, quota_exceeded, source]
      properties:
        tenant_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        traffic_quota_bytes:
          type: integer
          format: int64
          nullable: true
        device_limit:
          type: integer
          nullable: true
        key_ttl_seconds:
          type: integer
          nullable: true
        usage_bytes:
          type: integer
          format: int64
        quota_exceeded:
          type: boolean
        source:
          type: string
          enum: [tenant_default, user_override]
    RegisterDeviceRequest:
      type: object
      required: [tenant_id, user_id, device_fingerprint, platform]
      properties:
        tenant_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        device_fingerprint:
          type: string
          minLength: 1
        platform:
          type: string
          minLength: 1
    Device:
      type: object
      required: [id, tenant_id, user_id, device_fingerprint, platform, status, created_at]
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        device_fingerprint:
          type: string
        platform:
          type: string
        status:
          type: string
          enum: [active, blocked]
        created_at:
          type: string
          format: date-time
    Node:
      type: object
      required: [id, tenant_id, region, hostname, node_key_id, node_public_key, contract_version, agent_version, capabilities, identity_fingerprint, status, created_at]
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        region:
          type: string
        hostname:
          type: string
        node_key_id:
          type: string
        node_public_key:
          type: string
        contract_version:
          type: string
        agent_version:
          type: string
        capabilities:
          type: array
          items:
            type: string
        identity_fingerprint:
          type: string
        status:
          type: string
          enum: [pending, active, stale, offline, revoked]
        last_seen_at:
          type: string
          format: date-time
          nullable: true
        last_heartbeat_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
    NodeListResponse:
      type: object
      required: [items, limit, offset]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Node'
        limit:
          type: integer
        offset:
          type: integer
    CreateNodeRequest:
      type: object
      required: [tenant_id, region, hostname]
      properties:
        tenant_id:
          type: string
          format: uuid
        region:
          type: string
        hostname:
          type: string
        agent_version:
          type: string
        contract_version:
          type: string
        capabilities:
          type: array
          items:
            type: string
    NodeLifecycleRequest:
      type: object
      required: [tenant_id, node_id]
      properties:
        tenant_id:
          type: string
          format: uuid
        node_id:
          type: string
