services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./ops/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT}:6379"

  nats:
    image: nats:2.10-alpine
    restart: unless-stopped
    command: ["-js"]
    ports:
      - "${NATS_PORT}:4222"

  core-platform:
    build:
      context: ./services/core-platform
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      HTTP_ADDR: ":8081"
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      REDIS_ADDR: redis:6379
      NATS_URL: nats://nats:4222
      NODE_PKI_MODE: ${NODE_PKI_MODE:-strict}
      NODE_CA_MODE: ${NODE_CA_MODE:-file}
      NODE_CA_ACTIVE_ISSUER_ID: ${NODE_CA_ACTIVE_ISSUER_ID:-default-file-issuer}
      NODE_CA_PREVIOUS_ISSUER_IDS: ${NODE_CA_PREVIOUS_ISSUER_IDS:-}
      NODE_CA_CERT_PATH: ${NODE_CA_CERT_PATH:-}
      NODE_CA_KEY_PATH: ${NODE_CA_KEY_PATH:-}
      NODE_CERT_RENEW_BEFORE: ${NODE_CERT_RENEW_BEFORE:-168h}
      NODE_CERT_DEFAULT_TTL: ${NODE_CERT_DEFAULT_TTL:-720h}
      NODE_CERT_MAX_TTL: ${NODE_CERT_MAX_TTL:-720h}
      NODE_LEGACY_HMAC_FALLBACK: ${NODE_LEGACY_HMAC_FALLBACK:-false}
    depends_on:
      - postgres
      - redis
      - nats
    ports:
      - "${CORE_PLATFORM_PORT}:8081"

  api-gateway:
    build:
      context: ./apps/api-gateway
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      HTTP_ADDR: ":8080"
      CORE_PLATFORM_BASE_URL: http://core-platform:8081
      JWT_ISSUER: ${JWT_ISSUER}
      JWT_AUDIENCE: ${JWT_AUDIENCE}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      - core-platform
    ports:
      - "${API_GATEWAY_PORT}:8080"

  admin-web:
    build:
      context: .
      dockerfile: apps/admin-web/Dockerfile
    restart: unless-stopped
    profiles: ["ui"]
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://api-gateway:8080
    depends_on:
      - api-gateway
    ports:
      - "3000:3000"

  node-agent:
    build:
      context: ./apps/node-agent
      dockerfile: Dockerfile
    restart: unless-stopped
    profiles: ["agent"]
    environment:
      CONTROL_PLANE_URL: http://core-platform:8081
      NODE_TENANT_ID: ${NODE_AGENT_TENANT_ID:-00000000-0000-0000-0000-000000000001}
      NODE_ID: ${NODE_AGENT_ID:-node-local-1}
      NODE_KEY_ID: ${NODE_AGENT_KEY_ID:-node-key-local-1}
      NODE_PUBLIC_KEY: ${NODE_AGENT_PUBLIC_KEY:-node-public-key-local}
    depends_on:
      - core-platform

volumes:
  pgdata:
